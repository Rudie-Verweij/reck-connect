<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-label="Reck Connect data flow — opening a project">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1c1b19"/>
      <stop offset="100%" stop-color="#141413"/>
    </radialGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8875c"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a9c6d"/>
    </marker>
    <marker id="ahm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a877d"/>
    </marker>
  </defs>
  <style>
    .h1   { font-family:'Playfair Display', Georgia, serif; font-weight:700; }
    .body { font-family:'Lora', Georgia, serif; }
    .it   { font-family:'Lora', Georgia, serif; font-style:italic; }
    .mono { font-family:'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1400" height="760" fill="url(#bg)"/>

  <line x1="60" y1="74" x2="1340" y2="74" stroke="#3a3937"/>
  <text x="60"   y="58" class="mono" font-size="11" letter-spacing="3" fill="#8a877d">FIG. 2 — DATA FLOW</text>
  <text x="1340" y="58" text-anchor="end" class="mono" font-size="11" letter-spacing="3" fill="#8a877d">OPENING A PROJECT</text>
  <text x="700"  y="116" text-anchor="middle" class="h1" font-size="32" fill="#f5f2ea">From a click to a live PTY</text>
  <text x="700"  y="142" text-anchor="middle" class="it" font-size="15" fill="#b5b3a9">Eight steps. Two channels. One bearer token.</text>

  <g>
    <rect x="120"  y="170" width="320" height="46" rx="8" fill="#0c0c0b"/>
    <text x="280"  y="200" text-anchor="middle" class="mono" font-size="12" letter-spacing="3" fill="#e8875c">SATELLITE</text>
    <rect x="540"  y="170" width="320" height="46" rx="8" fill="#0c0c0b"/>
    <text x="700"  y="200" text-anchor="middle" class="mono" font-size="12" letter-spacing="3" fill="#e8875c">RECK-STATIOND</text>
    <rect x="960"  y="170" width="320" height="46" rx="8" fill="#0c0c0b"/>
    <text x="1120" y="200" text-anchor="middle" class="mono" font-size="12" letter-spacing="3" fill="#e8875c">PTY CHILD</text>
  </g>

  <line x1="280"  y1="216" x2="280"  y2="700" stroke="#3a3937" stroke-dasharray="2 4"/>
  <line x1="700"  y1="216" x2="700"  y2="700" stroke="#3a3937" stroke-dasharray="2 4"/>
  <line x1="1120" y1="216" x2="1120" y2="700" stroke="#3a3937" stroke-dasharray="2 4"/>

  <g>
    <circle cx="80" cy="258" r="14" fill="#e8875c"/>
    <text x="80" y="263" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">1</text>
    <text x="110" y="252" class="body" font-weight="700" font-size="14" fill="#f5f2ea">Click project in rail</text>
    <text x="110" y="270" class="it" font-size="13" fill="#b5b3a9">User picks reck-connect from the satellite rail.</text>
  </g>

  <g>
    <circle cx="80" cy="312" r="14" fill="#e8875c"/>
    <text x="80" y="317" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">2</text>
    <line x1="280" y1="318" x2="700" y2="318" stroke="#e8875c" stroke-width="2" marker-end="url(#ah)"/>
    <text x="490" y="308" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">GET /projects/:id</text>
    <text x="490" y="334" text-anchor="middle" class="it" font-size="11" fill="#8a877d">bearer auth · station mode · over Tailscale</text>
  </g>

  <g>
    <circle cx="80" cy="372" r="14" fill="#e8875c"/>
    <text x="80" y="377" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">3</text>
    <line x1="700" y1="378" x2="1120" y2="378" stroke="#e8875c" stroke-width="2" marker-end="url(#ah)"/>
    <text x="910" y="368" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">os/exec + creack/pty</text>
    <text x="910" y="394" text-anchor="middle" class="it" font-size="11" fill="#8a877d">no live panes → spawn default_pane (e.g. claude)</text>
  </g>

  <g>
    <circle cx="80" cy="432" r="14" fill="#e8875c"/>
    <text x="80" y="437" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">4</text>
    <line x1="700" y1="438" x2="280" y2="438" stroke="#e8875c" stroke-width="2" marker-end="url(#ah)"/>
    <text x="490" y="428" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">200 OK · ProjectDetail</text>
    <text x="490" y="454" text-anchor="middle" class="it" font-size="11" fill="#8a877d">{ project, panes: [{ id: p_abc123, kind: "claude" }] }</text>
  </g>

  <g>
    <circle cx="80" cy="492" r="14" fill="#e8875c"/>
    <text x="80" y="497" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">5</text>
    <line x1="280" y1="498" x2="700" y2="498" stroke="#e8875c" stroke-width="2" marker-end="url(#ah)"/>
    <text x="490" y="488" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">WS upgrade · /ws/:project/:pane</text>
  </g>

  <g>
    <circle cx="80" cy="540" r="14" fill="#e8875c"/>
    <text x="80" y="545" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">6</text>
    <line x1="700" y1="546" x2="280" y2="546" stroke="#7a9c6d" stroke-width="2" marker-end="url(#ahg)"/>
    <text x="490" y="536" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">hello { replay: last 64 KB, stoplight }</text>
    <text x="490" y="562" text-anchor="middle" class="it" font-size="11" fill="#8a877d">ring buffer flushes prior PTY output to xterm.js</text>
  </g>

  <g>
    <circle cx="80" cy="606" r="14" fill="#e8875c"/>
    <text x="80" y="611" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">7</text>
    <line x1="280" y1="600" x2="700" y2="600" stroke="#e8875c" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="700" y1="616" x2="1120" y2="616" stroke="#e8875c" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="1120" y1="616" x2="700" y2="616" stroke="#7a9c6d" stroke-width="2" marker-end="url(#ahg)"/>
    <line x1="700" y1="616" x2="280" y2="616" stroke="#7a9c6d" stroke-width="2" marker-end="url(#ahg)"/>
    <text x="490" y="588" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">input  (b64)  →  →  →</text>
    <text x="910" y="606" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">PTY master ⇄ child stdio</text>
    <text x="490" y="640" text-anchor="middle" class="mono" font-size="12" fill="#f5f2ea">←  ←  ← output (b64)</text>
  </g>

  <g>
    <circle cx="80" cy="676" r="14" fill="#e8875c"/>
    <text x="80" y="681" text-anchor="middle" class="mono" font-size="12" font-weight="700" fill="#141413">8</text>
    <path d="M 1120 686 C 1120 712, 700 712, 700 686" fill="none" stroke="#8a877d" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#ahm)"/>
    <text x="910" y="704" text-anchor="middle" class="mono" font-size="12" fill="#b5b3a9">POST /panes/:id/agent-event   →   stoplight ●</text>
  </g>

  <line x1="60" y1="722" x2="1340" y2="722" stroke="#3a3937"/>
  <text x="60" y="744" class="mono" font-size="10" letter-spacing="2" fill="#8a877d">SOLID · client → server     DASHED · loopback hook callback     GREEN · server → client</text>
  <text x="1340" y="744" text-anchor="end" class="it" font-size="11" fill="#b5b3a9">No code leaves the station.</text>
</svg>
