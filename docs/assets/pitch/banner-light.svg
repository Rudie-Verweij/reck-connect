<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 540" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Reck Connect">
  <defs>
    <style>
      .bg { fill: #F7F4ED; }
      .frame { stroke: #D4683A; stroke-width: 1.2; fill: none; opacity: 0.55; }
      .word { font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif; font-weight: 900; font-size: 220px; letter-spacing: -2px; }
      .reck { fill: #141413; }
      .connect { fill: #D4683A; font-style: italic; }
      .dot { fill: #141413; }
      .accent { stroke: #D4683A; stroke-width: 2.4; fill: none; }
      .accent-dot { fill: #D4683A; }
      .accent-square { fill: #D4683A; }
      .sub { font-family: 'Lora', Georgia, serif; font-style: italic; font-size: 30px; fill: #5A5850; letter-spacing: 0.5px; }
      .corner { stroke: #D4683A; stroke-width: 2; fill: none; }
      .meta { font-family: 'Lora', Georgia, serif; font-size: 18px; fill: #8A877D; letter-spacing: 4px; }
    </style>
  </defs>

  <rect class="bg" width="1920" height="540"/>

  <rect class="frame" x="40" y="40" width="1840" height="460"/>

  <path class="corner" d="M 40 80 L 40 40 L 80 40"/>
  <path class="corner" d="M 1840 40 L 1880 40 L 1880 80"/>
  <path class="corner" d="M 1880 460 L 1880 500 L 1840 500"/>
  <path class="corner" d="M 80 500 L 40 500 L 40 460"/>

  <rect class="accent-square" x="40" y="20" width="60" height="6"/>

  <!-- Wordmark: single text element, centered, uses tspans for fill+style switches -->
  <text class="word" x="960" y="290" text-anchor="middle">
    <tspan class="reck">Reck </tspan><tspan class="connect">Connect</tspan><tspan class="dot">.</tspan>
  </text>

  <line class="accent" x1="850" y1="360" x2="930" y2="360"/>
  <circle class="accent-dot" cx="950" cy="360" r="4.5"/>
  <rect class="accent-square" x="975" y="356" width="9" height="9" transform="rotate(45 979.5 360.5)"/>
  <circle class="accent-dot" cx="1014" cy="360" r="4.5"/>
  <line class="accent" x1="1034" y1="360" x2="1114" y2="360"/>

  <text class="sub" x="960" y="430" text-anchor="middle">A satellite / station workbench for your coding agent.</text>

  <text class="meta" x="60" y="525">01 / 12</text>
  <text class="meta" x="1860" y="525" text-anchor="end">RECK · CONNECT</text>
</svg>
