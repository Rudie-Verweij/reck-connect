<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-label="Hybrid mode — local and station daemons running side by side">
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#161513"/>
      <stop offset="100%" stop-color="#141413"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="540" fill="url(#paper)"/>

  <line x1="64" y1="56" x2="1216" y2="56" stroke="#3a3937"/>
  <text x="64" y="44" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#8a877d">CHAPTER THREE — HYBRID BY DEFAULT</text>
  <text x="1216" y="44" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#8a877d">FIG. 03</text>

  <g stroke="#d4683a" stroke-width="2" opacity="0.3">
    <line x1="64" y1="80" x2="84" y2="80"/><line x1="64" y1="80" x2="64" y2="100"/>
    <line x1="1216" y1="80" x2="1196" y2="80"/><line x1="1216" y1="80" x2="1216" y2="100"/>
    <line x1="64" y1="460" x2="84" y2="460"/><line x1="64" y1="460" x2="64" y2="440"/>
    <line x1="1216" y1="460" x2="1196" y2="460"/><line x1="1216" y1="460" x2="1216" y2="440"/>
  </g>

  <!-- LOCAL DAEMON -->
  <g>
    <rect x="80" y="160" width="320" height="220" rx="10" fill="#1c1b19" stroke="#3a3937"/>
    <text x="100" y="190" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="2.5" fill="#8a877d">// LOCAL DAEMON</text>
    <text x="100" y="232" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="32" fill="#f5f2ea">On the laptop</text>
    <text x="100" y="258" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#5e97b5">127.0.0.1:7315</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
      <circle cx="108" cy="296" r="4" fill="#c9982e"/>
      <text x="124" y="300" fill="#f5f2ea">scratch</text>
      <text x="220" y="300" fill="#8a877d">— quick prototypes</text>

      <circle cx="108" cy="320" r="4" fill="#7a9c6d"/>
      <text x="124" y="324" fill="#f5f2ea">notes</text>
      <text x="220" y="324" fill="#8a877d">— small edits</text>
    </g>

    <text x="100" y="362" font-family="'Lora', Georgia, serif" font-style="italic" font-size="13" fill="#b5b3a9">Local-only is fine.</text>
  </g>

  <g stroke="#e8875c" fill="none" stroke-width="1.5" opacity="0.7">
    <line x1="400" y1="270" x2="500" y2="270"/>
    <polyline points="492,265 500,270 492,275"/>
  </g>
  <text x="450" y="258" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" letter-spacing="1.5" fill="#8a877d">LOOPBACK</text>

  <!-- SATELLITE -->
  <g>
    <rect x="500" y="180" width="280" height="180" rx="10" fill="#0c0c0b" stroke="#2a2927"/>
    <text x="640" y="218" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="2.5" fill="#8a877d">// SATELLITE</text>
    <text x="640" y="262" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="34" fill="#f5f2ea">One cockpit</text>
    <text x="640" y="296" text-anchor="middle" font-family="'Lora', Georgia, serif" font-style="italic" font-size="14" fill="#b5b3a9">Two daemons running.</text>
    <text x="640" y="318" text-anchor="middle" font-family="'Lora', Georgia, serif" font-style="italic" font-size="14" fill="#b5b3a9">No shared state.</text>
    <circle cx="640" cy="340" r="5" fill="#e8875c"/>
  </g>

  <g stroke="#e8875c" fill="none" stroke-width="1.5" opacity="0.7">
    <line x1="780" y1="270" x2="880" y2="270"/>
    <polyline points="872,265 880,270 872,275"/>
  </g>
  <text x="830" y="258" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" letter-spacing="1.5" fill="#8a877d">TAILSCALE</text>

  <!-- STATION DAEMON -->
  <g>
    <rect x="880" y="160" width="320" height="220" rx="10" fill="#1c1b19" stroke="#3a3937"/>
    <text x="900" y="190" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="2.5" fill="#8a877d">// STATION DAEMON</text>
    <text x="900" y="232" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="32" fill="#f5f2ea">On the station</text>
    <text x="900" y="258" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#5e97b5">100.x.y.z:7315</text>

    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
      <circle cx="908" cy="296" r="4" fill="#7a9c6d"/>
      <text x="924" y="300" fill="#f5f2ea">reck-connect</text>
      <text x="1060" y="300" fill="#8a877d">— this app</text>

      <circle cx="908" cy="320" r="4" fill="#c9982e"/>
      <text x="924" y="324" fill="#f5f2ea">my-app</text>
      <text x="1060" y="324" fill="#8a877d">— production code</text>
    </g>

    <text x="900" y="362" font-family="'Lora', Georgia, serif" font-style="italic" font-size="13" fill="#b5b3a9">Station-only is fine.</text>
  </g>

  <line x1="64" y1="484" x2="1216" y2="484" stroke="#3a3937"/>
  <text x="64" y="510" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#8a877d">EACH PROJECT LIVES ON EXACTLY ONE HOST · SWITCH WITH A CLICK</text>
  <text x="1216" y="510" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#8a877d">RECK CONNECT</text>
</svg>
