<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Reck Connect concepts: project, pane, stoplight, rail">
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#161513"/>
      <stop offset="100%" stop-color="#141413"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#paper)"/>

  <line x1="64" y1="56" x2="1216" y2="56" stroke="#3a3937"/>
  <text x="64" y="44" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#8a877d">CHAPTER TWO — A SMALL VOCABULARY</text>
  <text x="1216" y="44" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#8a877d">FIG. 02</text>

  <g stroke="#d4683a" stroke-width="2" opacity="0.3">
    <line x1="64" y1="80" x2="84" y2="80"/><line x1="64" y1="80" x2="64" y2="100"/>
    <line x1="1216" y1="80" x2="1196" y2="80"/><line x1="1216" y1="80" x2="1216" y2="100"/>
    <line x1="64" y1="720" x2="84" y2="720"/><line x1="64" y1="720" x2="64" y2="700"/>
    <line x1="1216" y1="720" x2="1196" y2="720"/><line x1="1216" y1="720" x2="1216" y2="700"/>
  </g>

  <line x1="640" y1="120" x2="640" y2="690" stroke="#2a2927"/>
  <line x1="100" y1="410" x2="1180" y2="410" stroke="#2a2927"/>

  <!-- PROJECT -->
  <g>
    <text x="120" y="148" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="2.5" fill="#8a877d">// 01 — PROJECT</text>
    <text x="120" y="200" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="40" fill="#f5f2ea">Project</text>
    <text x="120" y="232" font-family="'Lora', Georgia, serif" font-style="italic" font-size="15" fill="#b5b3a9">A folder, with at least one running pane.</text>

    <g transform="translate(120 260)">
      <!-- container -->
      <rect x="0" y="0" width="400" height="128" rx="6" fill="#1c1b19" stroke="#3a3937"/>
      <!-- header strip -->
      <rect x="0" y="0" width="400" height="26" rx="6" fill="#0c0c0b"/>
      <rect x="0" y="14" width="400" height="12" fill="#0c0c0b"/>
      <text x="16" y="18" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#b5b3a9">my-app/</text>
      <text x="384" y="18" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#8a877d">3 panes</text>

      <!-- pane 1: claude -->
      <rect x="16" y="42" width="120" height="72" rx="4" fill="#0c0c0b" stroke="#2a2927"/>
      <circle cx="28" cy="56" r="3" fill="#7a9c6d"/>
      <text x="40" y="60" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#b5b3a9">claude</text>
      <text x="28" y="80" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" fill="#8a877d">› working…</text>
      <text x="28" y="98" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" fill="#5e97b5">▍</text>

      <!-- pane 2: shell -->
      <rect x="146" y="42" width="120" height="72" rx="4" fill="#0c0c0b" stroke="#2a2927"/>
      <circle cx="158" cy="56" r="3" fill="#c9982e"/>
      <text x="170" y="60" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#b5b3a9">shell</text>
      <text x="158" y="80" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" fill="#8a877d">$ _</text>

      <!-- pane 3: codex -->
      <rect x="276" y="42" width="120" height="72" rx="4" fill="#0c0c0b" stroke="#2a2927"/>
      <circle cx="288" cy="56" r="3" fill="#8a877d"/>
      <text x="300" y="60" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#b5b3a9">codex</text>
      <text x="288" y="80" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="9" fill="#8a877d">› idle</text>
    </g>
  </g>

  <!-- PANE -->
  <g>
    <text x="700" y="148" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="2.5" fill="#8a877d">// 02 — PANE</text>
    <text x="700" y="200" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="40" fill="#f5f2ea">Pane</text>
    <text x="700" y="232" font-family="'Lora', Georgia, serif" font-style="italic" font-size="15" fill="#b5b3a9">One PTY process. Many per project.</text>

    <g transform="translate(700 260)">
      <rect x="0" y="0" width="380" height="120" rx="6" fill="#0c0c0b" stroke="#2a2927"/>
      <rect x="0" y="0" width="380" height="22" rx="6" fill="#201f1d"/>
      <text x="14" y="15" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#8a877d">claude — my-app</text>
      <circle cx="362" cy="11" r="4" fill="#7a9c6d"/>
      <text x="14" y="44" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#b5b3a9">$ claude</text>
      <text x="14" y="64" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#7a9c6d">● ready</text>
      <text x="14" y="86" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#b5b3a9">› refactor the auth middleware</text>
      <text x="14" y="106" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" fill="#e8875c">▍</text>
    </g>
  </g>

  <!-- STOPLIGHT -->
  <g>
    <text x="120" y="450" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="2.5" fill="#8a877d">// 03 — STOPLIGHT</text>
    <text x="120" y="502" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="40" fill="#f5f2ea">Stoplight</text>
    <text x="120" y="534" font-family="'Lora', Georgia, serif" font-style="italic" font-size="15" fill="#b5b3a9">Four states. One dot per pane.</text>

    <g transform="translate(120 568)">
      <circle cx="20" cy="20" r="14" fill="#8a877d"/>
      <text x="20" y="56" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="1.5" fill="#b5b3a9">GRAY</text>
      <text x="20" y="74" text-anchor="middle" font-family="'Lora', Georgia, serif" font-style="italic" font-size="11" fill="#8a877d">just spawned</text>

      <circle cx="110" cy="20" r="14" fill="#7a9c6d"/>
      <text x="110" y="56" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="1.5" fill="#b5b3a9">GREEN</text>
      <text x="110" y="74" text-anchor="middle" font-family="'Lora', Georgia, serif" font-style="italic" font-size="11" fill="#8a877d">working</text>

      <circle cx="200" cy="20" r="14" fill="#c9982e"/>
      <text x="200" y="56" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="1.5" fill="#b5b3a9">ORANGE</text>
      <text x="200" y="74" text-anchor="middle" font-family="'Lora', Georgia, serif" font-style="italic" font-size="11" fill="#8a877d">idle</text>

      <circle cx="290" cy="20" r="14" fill="#c8726e"/>
      <text x="290" y="56" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="1.5" fill="#b5b3a9">RED</text>
      <text x="290" y="74" text-anchor="middle" font-family="'Lora', Georgia, serif" font-style="italic" font-size="11" fill="#8a877d">asking you</text>
    </g>

    <text x="120" y="668" font-family="'Lora', Georgia, serif" font-style="italic" font-size="13" fill="#b5b3a9">A project's stoplight is the worst of its panes'.</text>
  </g>

  <!-- RAIL -->
  <g>
    <text x="700" y="450" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" letter-spacing="2.5" fill="#8a877d">// 04 — RAIL</text>
    <text x="700" y="502" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="40" fill="#f5f2ea">Rail</text>
    <text x="700" y="534" font-family="'Lora', Georgia, serif" font-style="italic" font-size="15" fill="#b5b3a9">Project list down the satellite's left edge.</text>

    <g transform="translate(700 560)">
      <rect x="0" y="0" width="220" height="140" rx="6" fill="#1c1b19" stroke="#3a3937"/>
      <rect x="0" y="14" width="220" height="32" fill="#2a2927"/>
      <circle cx="20" cy="30" r="5" fill="#7a9c6d"/>
      <text x="36" y="34" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#f5f2ea">my-app</text>
      <text x="190" y="34" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#8a877d">3</text>

      <circle cx="20" cy="64" r="5" fill="#c9982e"/>
      <text x="36" y="68" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#b5b3a9">scratch</text>
      <text x="190" y="68" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#8a877d">1</text>

      <circle cx="20" cy="96" r="5" fill="#8a877d"/>
      <text x="36" y="100" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#b5b3a9">notes</text>
      <text x="190" y="100" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#8a877d">2</text>

      <circle cx="20" cy="128" r="5" fill="#c8726e"/>
      <text x="36" y="132" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#b5b3a9">deploy</text>
      <text x="190" y="132" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" fill="#8a877d">1</text>
    </g>
    <text x="940" y="600" font-family="'Lora', Georgia, serif" font-style="italic" font-size="13" fill="#b5b3a9">Click a project. See its panes.</text>
    <text x="940" y="624" font-family="'Lora', Georgia, serif" font-style="italic" font-size="13" fill="#b5b3a9">The number is its pane count.</text>
  </g>

  <line x1="64" y1="744" x2="1216" y2="744" stroke="#3a3937"/>
  <text x="64" y="770" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#8a877d">PROJECT · PANE · STOPLIGHT · RAIL</text>
  <text x="1216" y="770" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#8a877d">RECK CONNECT</text>
</svg>
