<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Reck Connect">
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf9"/>
      <stop offset="100%" stop-color="#f7f4ed"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8875c"/>
      <stop offset="100%" stop-color="#d4683a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#paper)"/>

  <!-- top hairline rule -->
  <line x1="64" y1="56" x2="1216" y2="56" stroke="#c8c4b6" stroke-width="1"/>
  <!-- editorial slug -->
  <text x="64" y="44" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#8a877d">VOL. II — STATION / SATELLITE — 2026</text>

  <!-- logo mark (rounded square + rotated orange diamond + cream dot) -->
  <g transform="translate(120 200)">
    <rect x="-90" y="-90" width="180" height="180" rx="32" ry="32" fill="#1c1b19"/>
    <g transform="rotate(45)">
      <rect x="-58" y="-58" width="116" height="116" rx="9" ry="9" fill="url(#orange)"/>
    </g>
    <circle cx="0" cy="0" r="16" fill="#f7f4ed"/>
  </g>

  <!-- wordmark -->
  <text x="260" y="190" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="92" fill="#2a2927" letter-spacing="-1">Reck Connect</text>
  <!-- tagline -->
  <text x="262" y="240" font-family="'Lora', Georgia, serif" font-style="italic" font-size="26" fill="#5a5850">A station / satellite workbench for Claude Code.</text>

  <!-- bottom hairline rule + caption -->
  <line x1="64" y1="304" x2="1216" y2="304" stroke="#c8c4b6" stroke-width="1"/>
  <text x="64" y="332" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#8a877d">DAEMON · PTY · TAILSCALE · ELECTRON · XTERM.JS</text>
  <text x="1216" y="332" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#8a877d">github.com/Rudie-Verweij/reck-connect</text>
</svg>
