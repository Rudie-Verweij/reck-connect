appId: com.reckonlabs.reckconnect.satellite
productName: Reck Connect Satellite
copyright: "© 2026 Reckon Labs"
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  # Unsigned in step 1 — right-click → Open to launch
  identity: null
  gatekeeperAssess: false
extraMetadata:
  main: dist/main/main.js
